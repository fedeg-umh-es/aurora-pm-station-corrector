project: aurora-pm-station-corrector
phase: smoke_test_v0

scientific_question: >
  Can a train-only local corrector improve PM10/PM2.5 peak skill relative
  to raw Aurora-AQ and persistence at urban Mediterranean stations?

study_type: validation_technical_internal

dataset:
  stations_source: TBD
  aurora_source: TBD
  frequency: daily
  pollutants:
    - PM10
    - PM25
  stations: []

evaluation:
  protocol: rolling_origin
  preprocessing: train_only
  leakage_policy: strict
  lead_times:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7

baselines:
  - persistence
  - aurora_raw
  - xgb_lag_only

models:
  - aurora_raw
  - local_corrector_v0

metrics:
  primary:
    - rmse
    - mae
  secondary:
    - p90_recall
    - peak_bias

success_criterion: >
  The local corrector must improve peak-sensitive performance relative to
  raw Aurora-AQ without collapsing average error performance.

notes:
  - H* is not the contribution of this repo.
  - Rolling-origin is protocol infrastructure, not novelty.
  - Skill_VP is not active in v0.
  - No fine-tuning of Aurora in this phase.

seed: 42
